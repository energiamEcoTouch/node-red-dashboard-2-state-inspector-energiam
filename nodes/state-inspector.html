<script type="text/javascript">
    RED.nodes.registerType('state-inspector', {
        category:     'EnergIAM',
        color:        '#27F555',
        icon:         'icons/energiam.png',
        paletteLabel: 'state inspector',

        defaults: {
            name:        { value: '' },
            // Dashboard 2.0 requiere estos campos para el widget
            group:       { value: '', type: 'ui-group', required: true },
            width:       { value: 0 },
            height:      { value: 0 },
            // Propiedades del nodo
            maxColumnas: { value: 10,        validate: RED.validators.number() },
            ordenFilas:  { value: 'arrival' },
            colorTrue:   { value: '#3fb950' },
            colorFalse:  { value: '#f85149' },
            colorNum:    { value: '#58a6ff' },
            colorStr:    { value: '#ffa657' },
            colorNull:   { value: '#484f58' }
        },

        inputs:  1,
        outputs: 0,

        label: function () {
            return this.name || 'state inspector'
        },
        labelStyle: function () {
            return this.name ? 'node_label_italic' : ''
        },

        oneditprepare: function () {
            const colores = ['colorTrue', 'colorFalse', 'colorNum', 'colorStr', 'colorNull']
            colores.forEach(id => {
                $(`#node-input-${id}`).val(this[id] || '')
            })
        }
    })
</script>

<script type="text/html" data-help-name="state-inspector">
    <p>
        Widget nativo de <strong>Node-RED Dashboard 2.0</strong> que captura snapshots de variables
        en distintos momentos y los muestra como una tabla comparativa de estados.
    </p>
    <p>
        Cada snapshot es una <strong>columna</strong>. Cada variable observada es una <strong>fila</strong>.
        El valor en la celda es el valor de esa variable en ese momento.
    </p>

    <h3>Entrada</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>
            <code>{ nombre: "NombreEstado", valores: { var1: val1, ... } }</code><br>
            Agrega o actualiza una columna. Si el nombre ya existe, reemplaza los valores en su lugar.
        </dd>

        <dt>topic <span class="property-type">string</span></dt>
        <dd>
            <code>state-inspector/reset</code> — limpia todas las columnas.<br>
            <code>state-inspector/remove</code> — elimina la columna indicada en
            <code>msg.payload.nombre</code>.
        </dd>
    </dl>

    <h3>Acciones via payload</h3>
    <dl class="message-properties">
        <dt>payload.action = "reset"</dt>
        <dd>Limpia toda la tabla.</dd>
        <dt>payload.action = "remove", payload.nombre = "X"</dt>
        <dd>Elimina la columna "X".</dd>
    </dl>

    <h3>Coloreado semántico</h3>
    <ul>
        <li><code>true</code> → verde (configurable)</li>
        <li><code>false</code> → rojo (configurable)</li>
        <li>números → azul (configurable)</li>
        <li>strings → naranja (configurable)</li>
        <li>null/undefined → gris (configurable)</li>
    </ul>

    <h3>Notas de diseño</h3>
    <ul>
        <li>El nodo es agnóstico de la fuente: funciona con flow.context(), MQTT, OPC-UA, DB, etc.</li>
        <li>Cada instancia del nodo mantiene su estado interno independiente.</li>
        <li>Las nuevas keys en <code>valores</code> se agregan automáticamente como filas.</li>
        <li>Al superar el máximo de columnas, se descarta la más antigua (FIFO).</li>
        <li>Los headers y la primera columna son sticky para facilitar el scroll.</li>
    </ul>

    <h3>Ejemplo</h3>
    <pre><code>msg.payload = {
    nombre: "Habilitado",
    valores: {
        enable:      flow.get('enable'),
        jog:         flow.get('jog'),
        valorActual: flow.get('valorActual')
    }
}</code></pre>
</script>
